<div class="flex gap-6 max-w-6xl mx-auto px-4">

  <!-- Main Feed -->
  <div class="w-full lg:w-3/5">
    <div class="bg-white my-3 p-4 lg:p-6 rounded-2xl dark:bg-gray-600!">
      <input type="text" (click)="openDialog()"
        class="w-full p-4 border-2 border-gray-300 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400 rounded-full lg:placeholder:text-xl sm:placeholder:text-sm"
        placeholder="What's on your mind today..">
    </div>

    @if (!allPosts() || allPosts().length === 0) {
    <app-skelton-loading-posts></app-skelton-loading-posts>
    } @else {
    @for (post of allPosts(); track post._id) {
    @if (post.sharedPost) {
    <div class="rounded-2xl bg-white my-3 p-4 lg:p-6 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-100">
      <header>
        <div class="flex justify-between w-full items-center">
          <div class="flex gap-4 items-center">
            @if (post.user.photo) {
            <img [src]="post.user.photo" alt="userPhoto" class="w-12 h-12 rounded-full object-cover">
            } @else {
            <img src="/images/profile.png" class="w-12 h-12 rounded-full" alt="userProfile">
            }
            <div>
              <h2 class="text-base font-bold">{{ post.user.name }}</h2>
              <time class="text-xs text-gray-400">{{ post.createdAt | date:'medium' }}</time>
            </div>
          </div>
          <div>
            <button matIconButton [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="editPosts(post)">
                <mat-icon>edit</mat-icon><span>Update</span>
              </button>
              <button mat-menu-item (click)="deletePost(post._id)">
                <mat-icon>delete</mat-icon><span>Remove</span>
              </button>
              <button mat-menu-item (click)="savePost(post._id)">
                <mat-icon>bookmark_border</mat-icon>
                <span>{{ post.bookmarked ? 'Saved' : 'Save' }}</span>
              </button>
            </mat-menu>
          </div>
        </div>
      </header>
      <app-card-post-share [postShare]="post"></app-card-post-share>
    </div>
    } @else {
    <app-card-post [post]="post" (likePostCount)="post.likesCount=$event"></app-card-post>
    }
    }
    }

    @if (postLoading()) {
    <div class="flex justify-center my-6">
      <mat-progress-spinner [diameter]="40" mode="indeterminate"></mat-progress-spinner>
    </div>
    }

    <div class="search-results" infiniteScroll [infiniteScrollDistance]="2" [infiniteScrollThrottle]="50"
      (scrolled)="onScroll()"></div>
  </div>

  <!-- Sidebar -->
  <div class="hidden lg:block w-80  shrink-0">


    <app-suggestion-page></app-suggestion-page>

  </div>

</div>
