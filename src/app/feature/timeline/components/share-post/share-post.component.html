<div class="py-0 w-full">

  <!-- Header -->
  <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100 dark:border-gray-700">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-share text-blue-500 text-sm"></i>
      <h2 class="font-semibold text-base">Share Post</h2>
    </div>
    <button (click)="closeDialog()"
      class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
      <i class="fa-solid fa-xmark text-gray-400 text-sm"></i>
    </button>
  </div>

  <!-- Textarea -->
  <div class="px-5 py-4">
    <textarea id="content" [formControl]="content" rows="3"
      class="w-full p-3 text-sm rounded-lg border border-gray-200 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none bg-gray-50"
      placeholder="Write your thoughts here...">
    </textarea>
  </div>

  <!-- Shared Post Preview -->
  <div class="mx-5 mb-4 rounded-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
    <app-card-post-share [postShare]="postShare()"></app-card-post-share>
  </div>

  <!-- Footer -->
  <div class="flex justify-end gap-2 px-5 py-3 border-t border-gray-100 dark:border-gray-700">
    <button mat-stroked-button (click)="closeDialog()">Cancel</button>
    <button mat-flat-button color="primary" (click)="sharePost()" class="flex items-center gap-2">
      <i class="fa-solid fa-share text-xs"></i>
      Share
    </button>
  </div>

</div>
