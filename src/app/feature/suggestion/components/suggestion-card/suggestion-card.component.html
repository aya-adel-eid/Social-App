@if (isLoading()) {
@for (item of [1,2,3,4]; track $index) {}
<div class="flex items-center justify-between gap-3 animate-pulse">

  <!-- Left side -->
  <div class="flex items-center gap-3 min-w-0">

    <!-- Avatar -->
    <div class="w-10 h-10 rounded-full bg-gray-300 dark:bg-gray-700"></div>

    <!-- Text -->
    <div class="space-y-2">
      <div class="h-3 w-24 bg-gray-300 dark:bg-gray-700 rounded"></div>
      <div class="h-2 w-16 bg-gray-200 dark:bg-gray-600 rounded"></div>
    </div>

  </div>

  <!-- Button -->
  <div class="h-6 w-16 bg-gray-300 dark:bg-gray-700 rounded-md"></div>

</div>
}
@else {

@if (user()) {

<div class="flex items-center justify-between gap-3">

  <div class="flex items-center gap-3 min-w-0">

    <img [src]="user()?.photo" class="w-10 h-10 rounded-full object-cover shrink-0">

    <div class="min-w-0">
      <p class="text-base font-semibold text-gray-900 dark:text-gray-100 truncate">
        {{ user()?.name }}
      </p>

      <p class="text-xs text-gray-500 dark:text-gray-400">
        {{ user()?.mutualFollowersCount }} mutual friends
      </p>
    </div>

  </div>

  <button matButton="filled" class="text-[8px]  py-0.5 rounded flex items-center gap-1 leading-none"
    (click)="followUser(user()?._id!)">
    @if(isLoad()){
    <span>...</span>
    }
    @else {

    @if(isFollow()){
    <i class="fa-solid fa-user-check text-[8px]"></i>
    <span class="ps-0.5">Following</span>
    }
    @else {
    <i class="fa-solid fa-user-plus text-[8px]"></i>
    <span class="ps-0.5">Follow</span>
    }

    }
  </button>

</div>
}
}
