<form [formGroup]="signInForm" (ngSubmit)="sendData()" class="w-full mx-auto">

  <!-- Title -->
  <div class="text-center mb-6">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Sign in</h2>
    <p class="text-sm text-gray-400 mt-1">Welcome back! Please enter your details.</p>
  </div>

  <!-- Fields -->
  <div class="flex flex-col gap-4 mb-4">
    <app-input-form [type]="'email'" formControlName="email" [control]="signInForm.get('email')"
      [placeholder]="'Enter your email'" [label]="'Email'" [idInput]="'email'">
    </app-input-form>

    <app-input-form [type]="'password'" formControlName="password" [control]="signInForm.get('password')"
      [placeholder]="'Enter your password'" [label]="'Password'" [idInput]="'password'">
    </app-input-form>
  </div>

  <!-- Success Message -->
  @if (successMessage) {
  <div class="flex items-center gap-2 p-3 mb-4 bg-green-50 border border-green-200 rounded-lg">
    <i class="fa-solid fa-circle-check text-green-500 text-sm flex-shrink-0"></i>
    <span class="text-green-700 text-sm font-medium">{{ successMessage }}</span>
  </div>
  }

  <!-- Error Message -->
  @if (errorMessage) {
  <div class="flex items-center gap-2 p-3 mb-4 bg-red-50 border border-red-200 rounded-lg">
    <i class="fa-solid fa-circle-exclamation text-red-500 text-sm flex-shrink-0"></i>
    <span class="text-red-700 text-sm font-medium">{{ errorMessage }}</span>
  </div>
  }

  <!-- Submit -->
  <button type="submit" [disabled]="isLoading()"
    class="w-full py-2.5 bg-blue-500 hover:bg-blue-600 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
    @if (isLoading()) {
    <i class="fas fa-spinner fa-spin"></i>
    }
    Sign In
  </button>

  <!-- Register link -->
  <p class="text-center text-sm text-gray-400 mt-5">
    Don't have an account?
    <a routerLink="register" class="text-blue-500 font-semibold hover:underline ml-1 cursor-pointer">
      Sign up now
    </a>
  </p>

</form>
